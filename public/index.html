<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missing Person Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">

<h1>Missing Person Finder</h1>
<p class="subtitle">AI-powered tool to provide tips based on uploaded photos and descriptions.</p>

<form id="uploadForm" enctype="multipart/form-data">
  <label for="photo">Upload Photo:</label>
  <input type="file" id="photo" name="photo" accept="image/*" required>

  <label for="description">Description:</label>
  <textarea id="description" name="description" placeholder="Age, city, clothes, etc." required></textarea>

  <button type="submit">Submit</button>
</form>

<div id="result" class="result"></div>

<div id="followUpContainer" style="display:none; margin-top:20px;">
  <label for="followUp">Ask more questions:</label>
  <textarea id="followUp" placeholder="Type your question here..." rows="2"></textarea>
  <button id="askFollowUp">Ask</button>
</div>

<div id="redoContainer" style="display:none; margin-top:20px; text-align:center;">
  <button id="redoBtn">Redo</button>
</div>

</div>

<script>
function formatText(text) {
  if (!text) return "";
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  text = text.replace(/^#### (.*)$/gm, "<h4>$1</h4>");
  text = text.replace(/^\s*-\s+(.*)$/gm, "<li>$1</li>");
  text = text.replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>");
  text = text.replace(/\n{2,}/g, "<p></p>");
  return text;
}

const form = document.getElementById("uploadForm");
const resultDiv = document.getElementById("result");
const followUpContainer = document.getElementById("followUpContainer");
const followUpInput = document.getElementById("followUp");
const followUpBtn = document.getElementById("askFollowUp");
const redoContainer = document.getElementById("redoContainer");
const redoBtn = document.getElementById("redoBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  resultDiv.innerHTML = "<p>Searching...</p>";

  const formData = new FormData(form);

  try {
    const res = await fetch("/upload", { method: "POST", body: formData });
    const data = await res.json();

    // Show AI suggestion and filename only
    resultDiv.innerHTML = `
      <h2>Result:</h2>
      <p><strong>Filename:</strong> ${data.filename || "No file"}</p>
      <div class="ai-suggestion" id="chatBox">
        <p><strong>AI:</strong></p>
        ${formatText(data.suggestion || "No answer received")}
      </div>
    `;

    followUpContainer.style.display = "block";
    redoContainer.style.display = "block";
    followUpContainer.scrollIntoView({ behavior: "smooth", block: "start" });

  } catch (err) {
    resultDiv.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
  }
});

followUpBtn.addEventListener("click", async (e) => {
  e.preventDefault();
  const question = followUpInput.value.trim();
  if (!question) return;

  const chatBox = document.getElementById("chatBox");
  const userDiv = document.createElement("div");
  userDiv.innerHTML = `<p><strong>You:</strong> ${question}</p>`;
  chatBox.appendChild(userDiv);

  const processingDiv = document.createElement("div");
  processingDiv.innerHTML = `<p><em>Processing...</em></p>`;
  chatBox.appendChild(processingDiv);

  followUpInput.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch("/followup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    processingDiv.innerHTML = `<p><strong>AI:</strong></p>` + formatText(data.answer || "No answer received.");
    chatBox.scrollTop = chatBox.scrollHeight;
  } catch (err) {
    processingDiv.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }
});

redoBtn.addEventListener("click", () => {
  form.reset();
  resultDiv.innerHTML = "";
  followUpContainer.style.display = "none";
  redoContainer.style.display = "none";
  form.scrollIntoView({ behavior: "smooth", block: "start" });
});
</script>

</body>
</html>
